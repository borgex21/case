<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#eef1f5" />
<title>Central D'Oro · Sala D'Oro</title>
<style>
:root{
  --bg-a:#eefbfa;
  --bg-b:#f3f1fc;
  --bg-c:#eef5ff;
  --ink:#0b1f22;
  --muted:#5c7278;
  --line:rgba(13,50,55,.10);
  --glass:rgba(255,255,255,.52);
  --glass-2:rgba(255,255,255,.7);
  --glass-edge:rgba(255,255,255,.65);
  --accent:#0d9488;
  --accent-2:#38bdf8;
  --accent-ink:#0f766e;
  --champagne:#D4AF8C;
  --gold:#C9A84C;
  --good:#22c55e;
  --warn:#f59e0b;
  --danger:#fb7185;
  --shadow:0 24px 60px rgba(15,60,65,.10);
  --radius:26px;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  margin:0;color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,ui-sans-serif,sans-serif;
  background:
    radial-gradient(circle at 15% 15%, rgba(212,175,140,.06), transparent 45%),
    radial-gradient(circle at 12% 8%, rgba(45,212,191,.20), transparent 40%),
    radial-gradient(circle at 88% 6%, rgba(196,181,253,.22), transparent 42%),
    radial-gradient(circle at 25% 92%, rgba(125,211,252,.18), transparent 46%),
    radial-gradient(circle at 90% 85%, rgba(94,234,212,.14), transparent 40%),
    linear-gradient(160deg,var(--bg-a) 0%,var(--bg-b) 55%,var(--bg-c) 100%);
  background-attachment:fixed;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.shell{max-width:1200px;margin:0 auto;padding:16px 16px 96px}
.top{
  position:sticky;top:0;z-index:40;
  margin:-16px -16px 16px;padding:14px 16px 10px;
  background:rgba(238,251,250,.6);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border-bottom:1px solid var(--line);
}
.brandrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-ink);font-weight:800;background:linear-gradient(90deg, var(--accent-ink), var(--champagne), var(--accent-ink));background-size:200% 100%;background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:100% center}50%{background-position:0% center}}
.brandrow h1{margin:2px 0 0;font-size:22px;letter-spacing:-.04em}
.brandrow .who{
  display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;
  background:linear-gradient(135deg,rgba(13,148,136,.14),rgba(212,175,140,.14));
  border:1px solid rgba(13,148,136,.22);
  color:var(--accent-ink);font-size:12.5px;font-weight:850;letter-spacing:.02em;text-align:right;white-space:nowrap;
}
.nav{display:flex;gap:8px;overflow:auto;margin-top:12px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.navbtn{
  border:1px solid var(--glass-edge);background:rgba(255,255,255,.42);color:var(--muted);
  backdrop-filter:blur(10px);
  border-radius:999px;padding:10px 14px;white-space:nowrap;font-size:13px;font-weight:700;
}
.navbtn.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:#fff;box-shadow:0 10px 22px rgba(13,148,136,.28)}
.card{
  background:var(--glass);
  border:1px solid var(--glass-edge);
  backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);
  border-radius:var(--radius);box-shadow:var(--shadow), inset 0 1px rgba(255,255,255,.6);
}
.section{padding:20px;margin-bottom:14px}
.section h2{margin:0 0 12px;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
.muted{color:var(--muted)}
/* Seções de painel com separação clara */
.panel-section{
  display:grid;gap:16px;margin-bottom:28px;padding:24px;
  background:rgba(255,255,255,.35);border:1px solid var(--glass-edge);
  border-radius:24px;backdrop-filter:blur(20px);
}
.panel-section h2{
  margin:0 0 14px;font-size:1.15rem;letter-spacing:-.02em;font-weight:850;
  color:var(--accent-ink);text-transform:none;
}
.panel-section .tag{
  display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
  border-radius:999px;background:rgba(13,148,136,.12);
  color:var(--accent-ink);font-size:.65rem;font-weight:800;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:8px;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;
  font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-ink);
  background:rgba(13,148,136,.08);border:1px solid rgba(13,148,136,.18);font-weight:800;
}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:16px}
.kpi{padding:14px;border-radius:20px;background:rgba(255,255,255,.5);border:1px solid var(--glass-edge);backdrop-filter:blur(14px)}
.kpi .l{color:var(--muted);font-size:.8rem}
.kpi .v{margin-top:5px;font-size:1.55rem;font-weight:850;letter-spacing:-.02em}
.homegrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.module{
  display:grid;gap:8px;padding:20px;text-align:left;
  background:rgba(255,255,255,.5);border:1px solid var(--glass-edge);border-radius:24px;
  backdrop-filter:blur(20px);
  transition:transform .15s ease, box-shadow .15s ease;
}
.module:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.module strong{font-size:1.05rem;letter-spacing:-.02em}
.module span{color:var(--muted);font-size:.86rem;line-height:1.45}
.module .tag{width:fit-content;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-ink);font-weight:800}
.pill{
  display:inline-flex;align-items:center;justify-content:center;padding:6px 11px;border-radius:999px;
  font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;
}
.pill.good{background:rgba(34,197,94,.14);color:#0f7a3d}
.pill.warn{background:rgba(245,158,11,.16);color:#a15c07}
.pill.danger{background:rgba(251,113,133,.16);color:#b8244a}
.pill.neutral{background:rgba(13,50,55,.07);color:var(--muted)}
.pill.gold{background:rgba(13,148,136,.12);color:var(--accent-ink)}
.btn{
  border:0;border-radius:16px;padding:13px 16px;font-weight:750;color:#fff;
  background:linear-gradient(135deg,var(--accent),#0891b2);
  box-shadow:0 14px 28px rgba(13,148,136,.22);
}
.btn.secondary{color:var(--ink);background:rgba(255,255,255,.55);border:1px solid var(--glass-edge);box-shadow:none;backdrop-filter:blur(10px)}
.btn.small{padding:9px 12px;font-size:.82rem;border-radius:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.4)}
input,select,textarea{
  width:100%;padding:13px 14px;border-radius:16px;border:1px solid var(--line);
  background:rgba(255,255,255,.6);color:var(--ink);outline:none;backdrop-filter:blur(8px);
}
input:focus,select:focus,textarea:focus{border-color:rgba(13,148,136,.35);box-shadow:0 0 0 4px rgba(13,148,136,.1)}
textarea{min-height:84px;resize:vertical}
label{display:block;margin:0 0 6px;color:var(--muted);font-size:.8rem}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.list{display:grid;gap:10px}
.item{
  padding:14px;border-radius:18px;background:rgba(255,255,255,.5);border:1px solid var(--glass-edge);backdrop-filter:blur(14px);
}
.item .toprow{display:flex;justify-content:space-between;gap:10px;align-items:center}
.item h4{margin:0;font-size:.98rem;letter-spacing:-.02em}
.item .meta{margin-top:4px;color:var(--muted);font-size:.85rem;line-height:1.45}
.item .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.item.locked{opacity:.6}
.item.locked h4{color:var(--muted)}
/* Trilha */
.levels{display:grid;gap:12px}
.level{padding:18px;border:1px solid var(--glass-edge);transition:box-shadow .2s ease, border-color .2s ease}
.level.current{border-color:rgba(13,148,136,.45);box-shadow:var(--shadow), 0 0 0 3px rgba(13,148,136,.12), inset 0 1px rgba(255,255,255,.6)}
.level.locked{opacity:.68}
.levelhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
.levelhead strong{font-size:1.1rem;letter-spacing:-.02em}
.level.current .levelhead strong{color:var(--accent-ink)}
.unlockbadge{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-ink);margin-top:2px}
.progressline{height:7px;border-radius:999px;background:rgba(13,50,55,.08);overflow:hidden;margin:8px 0 12px}
.progressline span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.missions{display:grid;gap:8px}
.mission{
  display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:12px;
  padding:12px;border-radius:16px;background:rgba(255,255,255,.5);border:1px solid var(--glass-edge);text-align:left;backdrop-filter:blur(12px);
}
.mission:disabled{opacity:.5;cursor:not-allowed}
.mnum{
  width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
  background:rgba(13,50,55,.07);color:var(--muted);font-size:.8rem;font-weight:900;
}
.mission.done .mnum{background:rgba(34,197,94,.18);color:#0f7a3d}
.mission strong{display:block;font-size:1rem;letter-spacing:-.01em}
.mission small{display:block;color:var(--muted);margin-top:3px;font-size:.78rem;line-height:1.4}
/* Missão aberta */
.missionview{display:grid;gap:14px}
.steps{display:grid;gap:8px}
.step{display:grid;grid-template-columns:26px 1fr;gap:10px;align-items:start;padding:11px 12px;border-radius:14px;background:rgba(255,255,255,.45);border:1px solid var(--glass-edge)}
.step b{display:grid;place-items:center;width:24px;height:24px;border-radius:999px;background:rgba(13,148,136,.14);color:var(--accent-ink);font-size:.75rem}
.step p{margin:0;color:var(--ink);font-size:.9rem;line-height:1.5}
.choice{
  display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;
  padding:13px;border-radius:14px;background:rgba(255,255,255,.6);border:1px solid var(--line);line-height:1.45;font-size:.92rem;
}
.choice.correct{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.1)}
.choice.wrong{border-color:rgba(251,113,133,.4);background:rgba(251,113,133,.08)}
.feedback{padding:13px;border-radius:14px;font-size:.9rem;line-height:1.5}
.feedback.ok{background:rgba(34,197,94,.1);color:#0f7a3d;border:1px solid rgba(34,197,94,.25)}
.feedback.no{background:rgba(251,113,133,.08);color:#b8244a;border:1px solid rgba(251,113,133,.2)}
.section.ref{border-left:4px solid rgba(13,50,55,.18)}
.section.decisao{border-left:4px solid var(--accent);background:rgba(13,148,136,.06)}
.sectionkick{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:2px}
.sectionkick.decisao{color:var(--accent-ink)}
/* Busca */
.searchbox input{padding:16px 18px;border-radius:20px;font-size:1rem}
.hits{display:grid;gap:10px;margin-top:12px}
.popcard{padding:14px;border-radius:18px;background:rgba(255,255,255,.55);border:1px solid var(--glass-edge);backdrop-filter:blur(14px)}
.popcard summary{cursor:pointer;font-weight:750;letter-spacing:-.02em;display:flex;justify-content:space-between;gap:10px;align-items:center;list-style:none}
.popcard summary::-webkit-details-marker{display:none}
.popcard ul{margin:10px 0 0;padding-left:18px;color:var(--muted);font-size:.9rem;line-height:1.6}
mark{background:rgba(45,212,191,.32);color:inherit;border-radius:3px;padding:0 2px}
/* Tabs internos */
.subtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.subtab{border:1px solid var(--glass-edge);background:rgba(255,255,255,.42);color:var(--muted);border-radius:999px;padding:8px 13px;font-size:.82rem;font-weight:700;backdrop-filter:blur(10px)}
.subtab.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:#fff}
/* Semana */
.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}
.day{padding:12px;border-radius:16px;background:rgba(255,255,255,.45);border:1px solid var(--glass-edge);min-height:110px}
.day.today{border-color:rgba(13,148,136,.4);background:rgba(255,255,255,.7)}
.day .name{font-weight:800;margin-bottom:6px;font-size:.86rem}
.day .small{color:var(--muted);font-size:.78rem;line-height:1.45}
/* Lista da vez */
.vezname{font-size:clamp(2.6rem,8vw,4rem);letter-spacing:-.06em;line-height:.95;font-weight:900;margin:10px 0 6px;color:var(--ink)}
.rank{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:rgba(13,50,55,.07);color:var(--muted);font-size:.78rem;font-weight:900;flex:0 0 auto}
.rank.star{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff}
.vrow{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line)}
.vrow:last-child{border-bottom:0}
.vrow .grow{flex:1;min-width:0}
.vrow .rname{font-weight:750;font-size:.94rem}
.vrow .rsub{font-size:.8rem;color:var(--muted);margin-top:1px}
.notice{
  padding:13px;border-radius:16px;border:1px solid rgba(13,148,136,.22);
  background:rgba(13,148,136,.07);color:var(--accent-ink);font-size:.86rem;line-height:1.5;margin-bottom:12px;
}
.modal{position:fixed;inset:0;background:rgba(11,31,34,.35);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:14px}
.modal.open{display:flex}
.sheet{width:100%;max-width:540px;background:rgba(255,255,255,.85);backdrop-filter:blur(30px);border:1px solid var(--glass-edge);border-radius:26px 26px 18px 18px;padding:20px;box-shadow:var(--shadow)}
.sheet h3{margin:0 0 4px;font-size:1.2rem;letter-spacing:-.03em}
.sheet p{color:var(--muted);font-size:.9rem;line-height:1.5;margin:0 0 14px}
.footbar{
  position:fixed;left:0;right:0;bottom:0;z-index:39;
  background:rgba(238,251,250,.62);backdrop-filter:blur(24px) saturate(160%);
  border-top:1px solid var(--line);
  padding:8px 12px calc(8px + env(safe-area-inset-bottom));
}
.footinner{max-width:1200px;margin:0 auto;display:flex;gap:6px}
.footbtn{flex:1;border:0;background:transparent;color:var(--muted);border-radius:12px;padding:9px 4px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.footbtn.on{background:rgba(255,255,255,.75);color:var(--accent-ink);box-shadow:0 6px 16px rgba(13,148,136,.16)}
.hidden{display:none!important}

/* Anel do dia: elemento de assinatura */
.dayring-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.dayring{position:relative;width:132px;height:132px;flex:0 0 auto;filter:drop-shadow(0 0 26px rgba(45,212,191,.4)) drop-shadow(0 0 8px rgba(56,189,248,.25))}
.dayring svg{width:100%;height:100%;transform:rotate(-90deg)}
.dayring .ring-track{fill:none;stroke:rgba(13,50,55,.09);stroke-width:10}
.dayring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1)}
.dayring-label{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.dayring-label strong{display:block;font-size:1.7rem;font-weight:800;letter-spacing:-.03em}
.dayring-label span{display:block;font-size:.64rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-top:2px}
.dayring-copy{display:grid;gap:4px;min-width:160px}
.dayring-copy strong{font-size:1.05rem;letter-spacing:-.02em}
.dayring-copy span{color:var(--muted);font-size:.86rem;line-height:1.4}

/* Destaque comercial */
.spotlight{
  padding:22px;border-radius:26px;text-align:left;width:100%;
  background:linear-gradient(155deg,rgba(13,148,136,.94),rgba(8,145,178,.9));
  color:#eafffb;border:1px solid rgba(255,255,255,.25);box-shadow:0 26px 60px rgba(13,148,136,.32), 0 0 40px rgba(212,175,140,.22), inset 0 1px rgba(255,255,255,.3);
  position:relative;overflow:hidden;
}
.spotlight:before{content:"";position:absolute;inset:auto -30% -60% auto;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.28),transparent 70%)}
.spotlight .tag{display:inline-flex;padding:5px 11px;border-radius:999px;background:rgba(255,255,255,.18);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;font-weight:800}
.spotlight h3{margin:12px 0 6px;font-size:1.5rem;letter-spacing:-.03em}
.spotlight p{margin:0;color:rgba(234,255,251,.86);font-size:.92rem;line-height:1.5;max-width:52ch}
.spotlight .vplay{background:#fff;color:var(--accent-ink)}
.principios{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;position:relative}
.principio-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);font-size:.78rem;font-weight:700}

/* Vídeos */
.vcards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media(max-width:860px){.vcards{grid-template-columns:1fr}}
.vcard{display:grid;gap:8px;padding:20px;text-align:left;border-radius:24px;border:1px solid rgba(45,212,191,.28);
  background:linear-gradient(160deg,rgba(10,30,33,.94),rgba(6,20,24,.96));color:#eafffb;box-shadow:var(--shadow);
  transition:transform .15s ease}
.vcard:hover{transform:translateY(-2px)}
.vcard .vk{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:#5eead4;font-weight:800}
.vcard strong{font-size:1.05rem;letter-spacing:-.02em;color:#d6fff8}
.vcard span{color:#9fb8b8;font-size:.85rem;line-height:1.45}
.vcard .vmeta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.vplay{display:inline-grid;place-items:center;width:38px;height:38px;border-radius:50%;background:#2dd4bf;color:#062421;font-size:.9rem}
.vplayer{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;background:
  radial-gradient(circle at 20% -10%, rgba(45,212,191,.18), transparent 36%),
  radial-gradient(circle at 100% 0%, rgba(56,189,248,.1), transparent 30%),#071417;color:#eafffb}
.vplayer.open{display:flex}
.vtop{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px}
.vtop .vt{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#5eead4;font-weight:800}
.vclose{border:1px solid rgba(94,234,212,.3);background:transparent;color:#d6fff8;border-radius:999px;padding:8px 14px;font-size:.8rem;font-weight:800}
.vprog{display:flex;gap:5px;padding:0 16px}
.vprog i{flex:1;height:3px;border-radius:999px;background:rgba(234,255,251,.14);overflow:hidden;display:block}
.vprog i b{display:block;height:100%;width:0;background:#2dd4bf;border-radius:inherit}
.vstage{flex:1;display:grid;place-items:center;padding:20px 22px;overflow:hidden}
.vinner{width:min(680px,100%);display:grid;gap:16px;text-align:center;justify-items:center}
.vkick{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:#5eead4;font-weight:800;animation:vfade .6s ease both}
.vtitle{font-size:clamp(1.7rem,6vw,2.7rem);line-height:1.04;letter-spacing:-.045em;font-weight:900;color:#d6fff8;animation:vfade .6s .1s ease both;margin:0}
.vlines{display:grid;gap:9px;justify-items:center}
.vline{max-width:56ch;padding:11px 16px;border-radius:14px;background:rgba(234,255,251,.05);
  border:1px solid rgba(94,234,212,.18);color:#eafffb;font-size:.95rem;line-height:1.5;
  opacity:0;animation:vfade .55s ease forwards}
.vvis{height:120px;display:grid;place-items:center;animation:vfade .7s .05s ease both}
.vvis svg{height:110px;width:auto;max-width:280px;overflow:visible}
.vfoot{display:flex;justify-content:center;gap:10px;padding:14px 16px calc(16px + env(safe-area-inset-bottom))}
.vbtn{border:1px solid rgba(94,234,212,.3);background:rgba(234,255,251,.05);color:#d6fff8;border-radius:999px;min-width:46px;padding:11px 16px;font-weight:800;font-size:.85rem}
.vbtn.gold{background:#2dd4bf;border-color:#2dd4bf;color:#062421}
@keyframes vfade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes vpulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.12);opacity:1}}
@keyframes vspin{to{transform:rotate(360deg)}}
@keyframes vdash{to{stroke-dashoffset:0}}
@keyframes vfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.vp1{animation:vpulse 2.4s ease-in-out infinite}
.vsp{transform-origin:center;animation:vspin 14s linear infinite}
.vfl{animation:vfloat 3.2s ease-in-out infinite}
.vdr{stroke-dasharray:300;stroke-dashoffset:300;animation:vdash 1.6s .3s ease forwards}

@media(max-width:860px){
  .grid2{grid-template-columns:1fr}
  .kpis{grid-template-columns:1fr 1fr}
  .calendar{grid-template-columns:1fr 1fr}
  .homegrid{grid-template-columns:1fr}
  .dayring-wrap{justify-content:center;text-align:center}
}

/* ============ ESTADO ============ */
const KEY="central_doro_v1";
function todayISO(){return new Date().toISOString().slice(0,10)}
function todayBR(){return new Date().toLocaleDateString("pt-BR")}
function nowBR(){return new Date().toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short"})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}

const VEZ_FILAS=[["imediato","Atendimento Imediato"],["futuro","Agendamento Futuro"]];
function freshFila(profs){
  return {pointer:0,day:todayBR(),
    statuses:Object.fromEntries(profs.map(n=>[n,"present"])),
    counts:Object.fromEntries(profs.map(n=>[n,0]))};
}
function freshVezState(){
  const st={};
  VEZ_DEFAULT_CATS.forEach(c=>{
    st[c.id]={imediato:freshFila(c.profs), futuro:freshFila(c.profs)};
  });
  return st;
}
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
  }catch{}
  return {
    user:"", view:"painel",
    training:{done:{}},
    execucoes:[],           // registros de tarefas/ativações
    vez:{cats:structuredClone(VEZ_DEFAULT_CATS), state:freshVezState(), catAtual:"cab", log:[]}
  };
}
let DB=load();
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}

/* reset diário de presença na lista da vez, por categoria e por fila */
function normalizeVez(){
  DB.vez.cats.forEach(c=>{
    if(!DB.vez.state[c.id]||!DB.vez.state[c.id].imediato||!DB.vez.state[c.id].futuro){
      DB.vez.state[c.id]={imediato:freshFila(c.profs), futuro:freshFila(c.profs)};
    }
    VEZ_FILAS.forEach(([fid])=>{
      const s=DB.vez.state[c.id][fid];
      if(s.day!==todayBR()){
        s.statuses=Object.fromEntries(c.profs.map(n=>[n,"present"]));
        s.day=todayBR();
      }
      c.profs.forEach(n=>{
        if(!s.statuses[n])s.statuses[n]="present";
        if(s.counts[n]===undefined)s.counts[n]=0;
      });
      s.pointer=Math.min(s.pointer||0,Math.max(0,c.profs.length-1));
    });
  });
}

  const done=Object.keys(DB.training.done).length;
  return {total,done,pct:total?Math.round(done/total*100):0};
}

/* ============ TREINAMENTOS ============ */
function renderTrilha(){
  if(missaoAberta) return renderMissao();
  const t=statsTraining();
  let unlocked=true;
  return `
  <section class="card section">
    <h2>🎓 Sua Trilha de Formação</h2>
    <div class="progressline"><span style="width:${t.pct}%"></span></div>
    <div class="muted" style="font-size:.86rem"><span class="mono">${t.done}/${t.total}</span> missões · complete um nível para liberar o próximo</div>
  </section>
  <div class="levels">
  ${TRILHA.map((nivel,i)=>{
    const doneCount=nivel.missoes.filter(m=>DB.training.done[m.id]).length;
    const pct=Math.round(doneCount/nivel.missoes.length*100);
    const thisUnlocked=unlocked;
    const isCurrent=thisUnlocked&&pct<100;
    if(doneCount<nivel.missoes.length) unlocked=false;
    const levelNum=i+1;
    return `<section class="card level ${isCurrent?"current":""} ${thisUnlocked?"":"locked"}" style="border-left:6px solid ${thisUnlocked?"var(--accent)":"var(--muted)"}">
      <div class="levelhead">
        <div style="display:flex;align-items:center;gap:12px;flex:1">
          <div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:${thisUnlocked?"linear-gradient(135deg,var(--accent),var(--accent-2))":"rgba(13,50,55,.07)"};color:${thisUnlocked?"#fff":"var(--muted)"}; font-weight:900;font-size:1.2rem">${levelNum}</div>
          <div>
            <strong style="font-size:1.05rem;letter-spacing:-.02em">${esc(nivel.nome)}</strong>
            <div class="muted" style="font-size:.8rem;margin-top:2px">${esc(nivel.desc)}</div>
          </div>
        </div>
        ${pct===100?`<span class="pill good">✓ Concluído</span>`:thisUnlocked?`<span class="pill gold mono">${pct}%</span>`:`<span class="pill neutral">🔒 Bloqueado</span>`}
      </div>
      ${isCurrent?`<div class="unlockbadge" style="margin-top:12px">▸ Você está aqui · conclua para liberar o próximo</div>`:pct===100&&i<TRILHA.length-1?`<div class="unlockbadge" style="margin-top:12px">✓ Próximo nível desbloqueado</div>`:""}
      <div class="progressline" style="margin-top:12px"><span style="width:${pct}%"></span></div>
      <div class="missions" style="margin-top:14px">
        ${nivel.missoes.map((m,j)=>{
          const done=!!DB.training.done[m.id];
          return `<button class="mission ${done?"done":""}" ${thisUnlocked?"":"disabled"} onclick="abrirMissao('${m.id}')" style="border-left:3px solid ${done?"var(--good)":thisUnlocked?"var(--accent-2)":"var(--muted)"}">
            <span class="mnum">${done?"✓":j+1}</span>
            <span><strong>${esc(m.t)}</strong><small>${esc(m.resumo)}</small></span>
            <span class="pill ${done?"good":"neutral"}">${done?"✓ OK":"→ Abrir"}</span>
          </button>`;
        }).join("")}
      </div>
    </section>`;
  }).join("")}
  </div>`;
}
function findMissao(id){
  for(const n of TRILHA){const m=n.missoes.find(x=>x.id===id);if(m)return m}
  return null;
}
function abrirMissao(id){missaoAberta=id;quizEstado=null;render()}
function renderMissao(){
  const m=findMissao(missaoAberta);
  if(!m){missaoAberta=null;return renderTrilha()}
  const steps=m.steps||POPS.find(p=>p.id===m.pop)?.steps||[];
  const done=!!DB.training.done[m.id];
  return `<div class="missionview">
    <section class="card section">
      <button class="btn secondary small" onclick="missaoAberta=null;render()">← Voltar à trilha</button>
      <span class="sectionkick" style="margin-top:14px">Missão</span>
      <div style="font-size:2.1rem;font-weight:900;letter-spacing:-.045em;line-height:1.08">${esc(m.t)}</div>
      <p class="muted" style="line-height:1.5;font-size:.86rem;margin-top:6px">${esc(m.resumo)}</p>
    </section>
    <section class="card section ref">
      <span class="sectionkick">Referência</span>
      <h2 style="margin-top:0">Passo a passo oficial</h2>
      <div class="steps">
        ${steps.map((s,i)=>`<div class="step"><b>${i+1}</b><p>${esc(s)}</p></div>`).join("")}
      </div>
    </section>
    <section class="card section decisao">
      <span class="sectionkick decisao">Sua vez de responder</span>
      <h2 style="margin-top:0">Decisão de campo</h2>
      <p style="margin:0 0 12px;line-height:1.5">${esc(m.quiz.q)}</p>
      <div class="list">
        ${m.quiz.opts.map((o,i)=>{
          let cls="";
          if(quizEstado!==null){
            if(i===m.quiz.correct)cls="correct";
            else if(i===quizEstado)cls="wrong";
          }
          return `<button class="choice ${cls}" onclick="responder(${i})">${esc(o)}</button>`;
        }).join("")}
      </div>
      ${quizEstado!==null?`<div class="feedback ${quizEstado===m.quiz.correct?"ok":"no"}" style="margin-top:10px">
        <strong>${quizEstado===m.quiz.correct?"Correto.":"Ainda não."}</strong> ${esc(m.quiz.exp)}
      </div>`:""}
      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        ${quizEstado===m.quiz.correct&&!done?`<button class="btn" onclick="concluirMissao()">Concluir missão ✓</button>`:""}
        ${done?`<span class="pill good" style="align-self:center">Missão concluída</span>`:""}
      </div>
    </section>
  </div>`;
}
function responder(i){quizEstado=i;render()}
function concluirMissao(){
  DB.training.done[missaoAberta]=nowBR();
  save();missaoAberta=null;quizEstado=null;render();
}

/* ============ PROCEDIMENTOS (o "Google") ============ */
function highlight(text,q){
  if(!q)return esc(text);
  const safe=esc(text);
  try{
    const re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    return safe.replace(re,"<mark>$1</mark>");
  }catch{return safe}
}
function renderProcedimentos(){
  const q=buscaQuery.trim().toLowerCase();
  const setores=[...new Set(POPS.map(p=>p.setor))];
  const parado=!q&&procSetor==="Todos";
  const base=procSetor==="Todos"?POPS:POPS.filter(p=>p.setor===procSetor);
  const hits=q?base.filter(p=>(p.title+" "+p.group+" "+p.setor+" "+p.steps.join(" ")).toLowerCase().includes(q)):base;
  const grupos=[...new Set(hits.map(p=>p.setor+" · "+p.group))];
  return `
  <section class="card section" style="text-align:center;padding:${parado?"48px 20px":"20px"}">
    <div class="searchbox" style="max-width:520px;margin:0 auto">
      <input id="busca" type="search" placeholder="Busque um procedimento..." value="${esc(buscaQuery)}" />
    </div>
    <div class="subtabs" style="margin:14px 0 0;justify-content:center;display:flex">
      ${["Todos",...setores].map(st=>`<button class="subtab ${procSetor===st?"on":""}" onclick="procSetor='${st}';render()">${esc(st)}</button>`).join("")}
    </div>
    ${parado?`<div class="muted" style="font-size:.78rem;margin-top:14px">${POPS.length} procedimentos disponíveis</div>`:
      `<div class="muted" style="font-size:.78rem;margin-top:10px"><span class="mono">${hits.length}</span> resultados</div>`}
  </section>
  ${parado?"":grupos.map(g=>`
    <section class="card section">
      <h2>${esc(g)}</h2>
      <div class="hits">
        ${hits.filter(p=>p.setor+" · "+p.group===g).map(p=>`
          <details class="popcard" ${q?"open":""}>
            <summary>${highlight(p.title,q)}</summary>
            <ul>${p.steps.map(st2=>`<li>${highlight(st2,q)}</li>`).join("")}</ul>
          </details>`).join("")}
      </div>
    </section>`).join("")}`;
}

/* ============ TAREFAS & ATIVIDADES ============ */
/* Liberação por nível: cada tarefa/ativação só pode ser registrada depois
   que o nível correspondente da trilha estiver 100% concluído. */
const TASK_NIVEL={
  dia_agenda:"n1", dia_ausencias:"n1", dia_ocorrencias:"n1", seg_semana:"n1", qua_vitrine:"n1", qua_estoque:"n1", sex_fechamento:"n1",
  dia_whats:"n2", dia_confirma:"n2",
  dia_vez:"n3",
  dia_followup:"n5", dia_ativacoes:"n5", dia_noshow:"n5", sab_reflexo:"n5"
};
const ATIVACAO_NIVEL="n5";
function nivelCompleto(id){
  const n=TRILHA.find(x=>x.id===id);
  if(!n)return true;
  return n.missoes.every(m=>DB.training.done[m.id]);
}
function nivelNome(id){return TRILHA.find(x=>x.id===id)?.nome.replace(/^Nível \d+ · /,"")||id}
function lockedCta(nivelId){
  return `<div class="btnrow">
    <span class="pill neutral">🔒 Libera com ${esc(nivelNome(nivelId))}</span>
    <button class="btn secondary small" onclick="DB.view='aprender';subAprender='trilha';save();render()">Ir treinar</button>
  </div>`;
}
function tarefasDoDia(dow){
  const dia=CRONOGRAMA[dow];
  if(!dia)return null;
  return {...dia, tasks:[...DIARIAS,...dia.extras]};
}

  const dow=new Date().getDay();
  const dia=tarefasDoDia(dow);
  const ats=ativacoesDeHoje();
  const execsHoje=DB.execucoes.filter(e=>e.data===todayISO());

  const feitos=hojeItens.filter(isDone).length;
  const pctDia=hojeItens.length?Math.round(feitos/hojeItens.length*100):0;

  const dashoff=circ*(1-pctDia/100);

  const ring=`

    <div class="dayring-wrap">
      <div class="dayring">
        <svg viewBox="0 0 120 120">
          <circle class="ring-track" cx="60" cy="60" r="52"/>
          <circle class="ring-fill" cx="60" cy="60" r="52" stroke="url(#ringGrad)"
            stroke-dasharray="${circ}" stroke-dashoffset="${dashoff}"/>
          <defs><linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#2dd4bf"/><stop offset="50%" stop-color="#D4AF8C"/><stop offset="100%" stop-color="#38bdf8"/>

        </svg>
        <div class="dayring-label"><strong class="mono">${dia?pctDia+"%":"–"}</strong><span>hoje</span></div>
      </div>
      <div class="dayring-copy">
        <span class="sectionkick">Rotina do dia</span>
        <strong>${dia?esc(dia.dia)+": "+esc(dia.foco):"Domingo, salão fechado"}</strong>
        ${dia?`<span class="mono">${feitos}/${hojeItens.length} itens registrados</span>`:""}
        <span>Rotina é o checklist fixo. Ativações são contato com clientes.</span>
      </div>
    </div>
  </section>`;

  const sub =
    subTarefas==="semana" ? `
      <section class="card section">
        <h2>📅 Cronograma da semana</h2>
        <div class="notice"><strong>${esc(SALTO_APRESENTACAO)}</strong></div>
        <div class="calendar">
          ${[1,2,3,4,5,6].map(d=>{const cd=CRONOGRAMA[d];return `<div class="day ${d===dow?"today":""}">
            <div class="name">${esc(cd.dia)}</div>
            <div class="small">${esc(cd.foco)}</div>
            ${cd.extras.length?`<div class="small" style="margin-top:6px">${cd.extras.map(t=>"· "+esc(t.t)).join("<br>")}</div>`:""}
          </div>`}).join("")}
          <div class="day">
            <div class="name">Domingo</div>
            <div class="small">Salão fechado</div>
          </div>
        </div>
      </section>` :
    subTarefas==="matriz" ? `
      <section class="card section">
        <h2>📊 Matriz de Ativações</h2>
        <div class="list">
          ${ATIVACOES.map(a=>{
            const liberado=nivelCompleto(ATIVACAO_NIVEL);
            return `<div class="item ${liberado?"":"locked"}">
              <div class="toprow"><h4>${esc(a.nome)}</h4><span class="pill ${a.freq==="Diário"?"good":a.freq==="Semanal"?"warn":"neutral"}">${esc(a.freq)}</span></div>
              <div class="meta"><strong>Público:</strong> ${esc(a.publico)}<br><strong>Dia:</strong> ${esc(a.dia)}<br><strong>Critério:</strong> ${esc(a.criterio)}</div>
              ${liberado?`<div class="btnrow"><button class="btn secondary small" onclick="registrar('${a.id}','${esc(a.nome)}','ativacao')">✓ Registrar</button></div>`:lockedCta(ATIVACAO_NIVEL)}

        </div>
      </section>` :
    subTarefas==="registros" ? `

        <h2>📋 Histórico</h2>
        <div class="list">
          ${[...DB.execucoes].sort((a,b)=>b.ts-a.ts).slice(0,80).map(e=>`<div class="item">
            <div class="toprow"><h4>${esc(e.titulo)}</h4>
              <span class="pill ${e.status==="done"?"good":e.status==="partial"?"warn":"danger"}">${e.status==="done"?"✓ Ok":e.status==="partial"?"~ Parcial":"✕ Bloqueada"}</span></div>
            <div class="meta">${esc(e.quando)} · ${esc(e.user||"Equipe")}${e.obs?" · "+esc(e.obs):""}${e.evidencia?"<br>Evidência: "+esc(e.evidencia):""}</div>
          </div>`).join("")||`<div class="muted">Nenhum registro ainda.</div>`}
        </div>
      </section>` :
    !dia ? `
    <section class="card section">

    ${(dow===5||dow===6)?`<div class="notice"><strong>${esc(SALTO_APRESENTACAO)}</strong></div>`:""}
    <div style="display:grid;gap:28px">
      <div class="panel-section">
        <div><span class="tag">1️⃣ Primeira</span><h2>✓ Rotina Fixa do Dia</h2></div>
        <div class="muted">O que você DEVE fazer hoje, todo dia.</div>
        <div class="list">
          ${dia.tasks.map(t=>{
            const nv=TASK_NIVEL[t.id];
            const liberado=!nv||nivelCompleto(nv);
            const feito=isDone(t.id);
            return `<div class="item ${liberado?"":"locked"} ${feito?"opacity:.6":""}">
              <div class="toprow"><h4>${feito?"✅":"▯"} ${esc(t.t)}</h4>${feito?`<span class="pill good">Concluída</span>`:liberado?`<span class="pill warn">Pendente</span>`:""}</div>

            </div>`;
          }).join("")}
        </div>
      </div>
      <div class="panel-section">
        <div><span class="tag">2️⃣ Segunda</span><h2>📞 Contato com Clientes</h2></div>
        <div class="muted">Ativações e ações de relacionamento do dia.</div>
        ${ats.length?`<div class="list">
          ${ats.map(a=>{
            const liberado=nivelCompleto(ATIVACAO_NIVEL);
            const feito=isDone(a.id);
            return `<div class="item ${liberado?"":"locked"} ${feito?"opacity:.6":""}">
              <div class="toprow"><h4>${feito?"✅":"▯"} ${esc(a.nome)}</h4>${feito?`<span class="pill good">Feita</span>`:liberado?`<span class="pill gold">${esc(a.freq)}</span>`:""}</div>
              <div class="meta">${esc(a.publico)}: ${esc(a.criterio)}</div>
              ${liberado?`<div class="btnrow"><button class="btn secondary small" onclick="registrar('${a.id}','${esc(a.nome)}','ativacao')">📝 Registrar</button></div>`:
                `<div class="btnrow" style="gap:8px"><span class="muted" style="font-size:.8rem">🔒 Complete o Nível ${ATIVACAO_NIVEL.split(/(\d+)/)[1]} dos treinamentos para liberar</span><button class="btn secondary small" onclick="setView('aprender')">→ Ir para Treinamentos</button></div>`

function registrar(itemId,titulo,tipo){
  openModal("Registrar execução",titulo,`
    <div class="row">
      <div><label>Status</label><select id="rStatus">
        <option value="done">Concluída</option><option value="partial">Parcial</option><option value="blocked">Bloqueada</option>
      </select></div>
      <div><label>Evidência</label><input id="rEvid" placeholder="print, link, quantidade..."></div>
    </div>
    <div style="margin-top:10px"><label>Observação</label><textarea id="rObs" placeholder="O que foi feito, respostas, agendamentos gerados..."></textarea></div>
  `,()=>{
    DB.execucoes.push({
      id:uid(),ts:Date.now(),data:todayISO(),quando:nowBR(),
      itemId,titulo,tipo,user:DB.user,
      status:document.getElementById("rStatus").value,
      evidencia:document.getElementById("rEvid").value.trim(),
      obs:document.getElementById("rObs").value.trim()

/* ============ LISTA DA VEZ ============ */
function vezCat(){return DB.vez.cats.find(c=>c.id===DB.vez.catAtual)||DB.vez.cats[0]}
function vezSt(){return DB.vez.state[vezCat().id][vezFila]}
function stLabel(s){return s==="present"?"Presente":s==="absent"?"Ausente":"Ocupada"}
function stPill(s){return s==="present"?"good":s==="absent"?"danger":"warn"}
function firstAvailable(){
  const c=vezCat(),s=vezSt(),n=c.profs.length;
  for(let i=0;i<n;i++){
    const idx=(s.pointer+i)%n;
    if(s.statuses[c.profs[idx]]==="present")return idx;
  }
  return -1;
}
function daVez(){const i=firstAvailable();return i>=0?vezCat().profs[i]:null}
function ordemVisivel(){
  const c=vezCat(),s=vezSt(),arr=[];
  for(let i=0;i<c.profs.length;i++){
    const idx=(s.pointer+i)%c.profs.length;
    const n=c.profs[idx];
    arr.push({name:n,idx,status:s.statuses[n],count:s.counts[n]||0});
  }
  return arr;
}
function vezLog(tipo,detalhe){
  DB.vez.log.unshift({id:uid(),tipo,at:nowBR(),cat:DB.vez.catAtual,fila:vezFila,...detalhe});
  DB.vez.log=DB.vez.log.slice(0,400);
}
function marcarOcupado(){
  const nome=daVez();
  if(!nome)return;
  setStatusProf(nome,"occupied");
}
function passarVez(){
  const c=vezCat(),s=vezSt(),idx=firstAvailable();
  if(idx<0)return;
  const nome=c.profs[idx];
  s.pointer=(idx+1)%c.profs.length;
  vezLog("pular",{prof:nome,texto:`${nome} passou a vez, marcador avançou sem registrar atendimento`});
  save();render();
}
function renderVez(){
  const c=vezCat(),s=vezSt(),atual=daVez();
  const catTabs=DB.vez.cats.map(cat=>{
    const st=DB.vez.state[cat.id][vezFila];
    const pres=cat.profs.filter(n=>st.statuses[n]==="present").length;
    return `<button class="subtab ${DB.vez.catAtual===cat.id?"on":""}" onclick="DB.vez.catAtual='${cat.id}';save();render()">${esc(cat.name)} · ${pres}</button>`;
  }).join("");
  const filaTabs=VEZ_FILAS.map(([id,l])=>
    `<button class="subtab ${vezFila===id?"on":""}" onclick="vezFila='${id}';render()">${l}</button>`).join("");
  const viewTabs=[["vez","Da vez"],["presenca","Presença"],["historico","Histórico"],["config","Config"]].map(([id,l])=>
    `<button class="subtab ${vezView===id?"on":""}" onclick="vezView='${id}';render()">${l}</button>`).join("");

  let body="";
  if(vezView==="presenca"){
    body=`<div class="grid2">
      <section class="card section">
        <h2>Presença: ${esc(c.name)}</h2>
        <div class="list">
        ${c.profs.map(n=>`<div class="item">
          <div class="toprow"><h4>${esc(n)}</h4><span class="pill ${stPill(s.statuses[n])}">${stLabel(s.statuses[n])}</span></div>
          <div class="btnrow">
            <button class="btn secondary small" onclick="setStatusProf('${esc(n)}','present')">Presente</button>
            <button class="btn secondary small" onclick="setStatusProf('${esc(n)}','absent')">Ausente</button>
            <button class="btn secondary small" onclick="setStatusProf('${esc(n)}','occupied')">Ocupada</button>
          </div>
        </div>`).join("")}
        </div>
      </section>
      <section class="card section">
        <h2>Interpretação da regra</h2>
        <div class="notice"><strong>Ausente:</strong> sai da distribuição e perde as oportunidades do período. Ao voltar, retorna à ordem estrutural e aguarda o marcador alcançá-la.</div>
        <div class="notice"><strong>Ocupada:</strong> mantém a posição. O sistema pula temporariamente e, quando liberada, volta a ser elegível no ponto em que estiver.</div>
      </section>
    </div>`;
  } else if(vezView==="historico"){
    const items=DB.vez.log.filter(e=>e.cat===DB.vez.catAtual&&e.fila===vezFila).slice(0,100);
    body=`<section class="card section">
      <h2>Histórico: ${esc(c.name)} · ${esc(VEZ_FILAS.find(([id])=>id===vezFila)[1])}</h2>
      <div class="list">
      ${items.length?items.map(e=>`<div class="item">
        <div class="toprow"><h4>${esc(e.texto||e.tipo)}</h4><span class="muted" style="font-size:.78rem">${esc(e.at)}</span></div>
        <div class="meta">${e.prof?"Profissional: "+esc(e.prof):""}${e.cliente?" · Cliente: "+esc(e.cliente):""}${e.servico?" · Serviço: "+esc(e.servico):""}</div>
      </div>`).join(""):`<div class="muted">Nenhum evento nesta categoria.</div>`}
      </div>
    </section>`;
  } else if(vezView==="config"){
    body=`<div class="grid2">
      <section class="card section">
        <h2>Configurar: ${esc(c.name)}</h2>
        <label>Novo profissional</label>
        <div style="display:flex;gap:8px"><input id="novoProf" placeholder="Nome"><button class="btn small" onclick="addProf()">Adicionar</button></div>
        <div class="list" style="margin-top:12px">
          ${c.profs.map(n=>`<div class="item"><div class="toprow"><h4>${esc(n)}</h4>
            <button class="btn secondary small" onclick="removeProf('${esc(n)}')">Remover</button></div></div>`).join("")}
        </div>
      </section>
      <section class="card section">
        <h2>Manutenção</h2>
        <div class="notice">Os dados ficam salvos neste dispositivo (localStorage). Presença reseta automaticamente a cada dia; contadores e marcador são mantidos. Atendimento Imediato e Agendamento Futuro têm marcador, presença e contadores independentes.</div>
        <div class="btnrow" style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn secondary small" onclick="resetCategoria()">Resetar fila atual (${esc(VEZ_FILAS.find(([id])=>id===vezFila)[1])})</button>
        </div>
      </section>
    </div>`;
  } else {
    const ordem=ordemVisivel();
    body=`<div class="grid2">
      <section>
        <div class="notice"><strong>Regra ativa:</strong> a ordem estrutural nunca muda, o marcador gira. Ausente perde as oportunidades enquanto está fora. Ocupada preserva posição.</div>
        <section class="card section">
          <h2>${esc(c.name)} · próxima da vez</h2>
          <div class="vezname">${atual?esc(atual):"Sem disponível"}</div>
          <div class="muted" style="font-size:.9rem;line-height:1.5">
            Marcador estrutural em <strong>${esc(c.profs[s.pointer]||"")}</strong>.
            ${atual?`${esc(atual)} está elegível agora.`:"Marque presença ou libere profissionais para distribuir."}
          </div>
          <div class="list" style="margin-top:16px">
            <button class="btn" ${!atual?"disabled":""} onclick="abrirAtendimento()">Registrar atendimento da vez →</button>
            <button class="btn secondary" ${!atual?"disabled":""} onclick="marcarOcupado()">Marcar ocupado (mantém posição)</button>
            <button class="btn secondary" ${!atual?"disabled":""} onclick="passarVez()">Passar a vez (avança o marcador)</button>
          </div>
        </section>
      </section>
      <section class="card section">
        <h2>Próximos no ciclo</h2>
        ${ordem.map((p,i)=>`<div class="vrow">
          <div class="rank ${p.name===atual?"star":""}">${p.name===atual?"★":i+1}</div>
          <div class="grow"><div class="rname">${esc(p.name)}</div><div class="rsub"><span class="mono">${p.count}</span> atend. · posição fixa <span class="mono">${p.idx+1}</span></div></div>
          <span class="pill ${stPill(p.status)}">${stLabel(p.status)}</span>
        </div>`).join("")}
      </section>
    </div>`;
  }

  return `<div class="subtabs">${catTabs}</div><div class="subtabs">${filaTabs}</div><div class="subtabs">${viewTabs}</div>${body}`;
}
function setStatusProf(nome,status){
  const s=vezSt(),prev=s.statuses[nome];
  s.statuses[nome]=status;
  vezLog("status",{prof:nome,texto:`${nome}: ${stLabel(prev)} → ${stLabel(status)}`});
  save();render();
}
function abrirAtendimento(){
  const atual=daVez();
  openModal(
    "Atendimento da vez",
    `Pela fila. Profissional sugerida: ${atual||"nenhuma disponível"}.`,
    `<div class="row">
       <div><label>Cliente</label><input id="mCliente" placeholder="Nome da cliente"></div>
       <div><label>Serviço</label><input id="mServico" placeholder="Corte, escova..."></div>
     </div>`,
    ()=>{
      const cliente=document.getElementById("mCliente").value.trim();
      const servico=document.getElementById("mServico").value.trim();
      const c=vezCat(),s=vezSt(),idx=firstAvailable();
      if(idx>=0){
        const nome=c.profs[idx];
        s.counts[nome]=(s.counts[nome]||0)+1;
        s.pointer=(idx+1)%c.profs.length;
        vezLog("fila",{prof:nome,cliente,servico,texto:`${nome} atendeu pela fila`});
      }
      save();closeModal();render();
    });
}
function addProf(){
  const nome=document.getElementById("novoProf").value.trim();
  if(!nome)return;
  const c=vezCat();
  if(c.profs.includes(nome))return alert("Já existe nesta categoria.");
  c.profs.push(nome);
  VEZ_FILAS.forEach(([fid])=>{
    const st=DB.vez.state[c.id][fid];
    st.statuses[nome]="present";st.counts[nome]=0;
  });
  vezLog("add",{prof:nome,texto:`${nome} adicionada em ${c.name}`});
  save();render();
}
function removeProf(nome){
  if(!confirm(`Remover ${nome}?`))return;
  const c=vezCat();
  c.profs=c.profs.filter(n=>n!==nome);
  VEZ_FILAS.forEach(([fid])=>{
    const st=DB.vez.state[c.id][fid];
    delete st.statuses[nome];delete st.counts[nome];
    if(st.pointer>=c.profs.length)st.pointer=0;
  });
  vezLog("remove",{prof:nome,texto:`${nome} removida de ${c.name}`});
  save();render();
}
function resetCategoria(){
  if(!confirm("Resetar presença, contadores e marcador desta fila?"))return;
  const c=vezCat();
  DB.vez.state[c.id][vezFila]=freshFila(c.profs);
  vezLog("reset",{texto:`Categoria ${c.name} resetada (${VEZ_FILAS.find(([id])=>id===vezFila)[1]})`});
  save();render();
}

    case"search":return`<svg viewBox="0 0 120 110"><circle cx="52" cy="48" r="26" fill="none" stroke="${G}" stroke-width="3" class="vp1"/><line x1="72" y1="68" x2="94" y2="90" stroke="${G}" stroke-width="4" stroke-linecap="round" class="vdr"/></svg>`;

  }

function videoDur(v){return v.cenas.reduce((a,c)=>a+c.d,0)}
function renderVideos(){
  if(!DB.videosVistos)DB.videosVistos={};
  const resto=VIDEOS.filter(v=>v.id!=="vcomercial"&&v.id!=="vcapilar"&&v.id!=="vtrapezio");
  return `
  ${renderSpotlightComercial()}
  <section class="card section" style="margin-top:14px">
    <h2>Vídeos de treinamento</h2>
    <div class="muted" style="font-size:.86rem;line-height:1.5">Mini-aulas animadas baseadas nos POPs oficiais e no núcleo cultural. Toque para assistir: a cena pausa quando você tocar na tela.</div>
  </section>
  <div class="vcards">
    ${resto.map(v=>`<button class="vcard" onclick="playVideo('${v.id}')">
      <span class="vk">${DB.videosVistos[v.id]?"✓ Assistido":"Vídeo · "+videoDur(v)+"s"}</span>
      <strong>${esc(v.titulo)}</strong>
      <span>${esc(v.sub)}</span>
      <span class="vmeta"><span style="color:#9fb8b8;font-size:.75rem">${v.cenas.length} cenas</span><span class="vplay">▶</span></span>
    </button>`).join("")}
  </div>`;
}
let VP=null;
function playVideo(id){
  const v=VIDEOS.find(x=>x.id===id);if(!v)return;
  VP={v,cena:0,t0:Date.now(),pausado:false,acum:0,fim:false};
  document.getElementById("vplayer").classList.add("open");
  vRenderScene();
  if(VP.timer)clearInterval(VP.timer);
  VP.timer=setInterval(vTick,100);
}
function vElapsed(){return VP.pausado?VP.acum:VP.acum+(Date.now()-VP.t0)/1000}
function vTick(){
  if(!VP||VP.pausado||VP.fim)return;
  const dur=VP.v.cenas[VP.cena].d;
  const e=vElapsed();
  const seg=document.querySelector(`#vprog i:nth-child(${VP.cena+1}) b`);
  if(seg)seg.style.width=Math.min(100,e/dur*100)+"%";
  if(e>=dur)vNext();
}
function vGoto(i){
  VP.cena=i;VP.acum=0;VP.t0=Date.now();VP.fim=false;
  vRenderScene();
}
function vNext(){
  if(VP.cena<VP.v.cenas.length-1)vGoto(VP.cena+1);
  else{VP.fim=true;DB.videosVistos=DB.videosVistos||{};DB.videosVistos[VP.v.id]=nowBR();save();vRenderScene()}
}
function vPrev(){if(VP.cena>0)vGoto(VP.cena-1);else vGoto(0)}
function vPause(){
  if(VP.fim)return;
  if(VP.pausado){VP.t0=Date.now();VP.pausado=false}
  else{VP.acum=vElapsed();VP.pausado=true}
  document.getElementById("vpausebtn").textContent=VP.pausado?"▶":"⏸";
}
function closeVideo(){
  if(VP&&VP.timer)clearInterval(VP.timer);
  VP=null;
  document.getElementById("vplayer").classList.remove("open");
  render();
}
function vRenderScene(){
  const v=VP.v,c=v.cenas[VP.cena];
  const prog=v.cenas.map((_,i)=>`<i><b style="width:${i<VP.cena?100:0}%"></b></i>`).join("");
  const stage=VP.fim
    ?`<div class="vinner">
        <div class="vvis">${visSVG("check")}</div>
        <div class="vkick">Concluído</div>
        <h3 class="vtitle">${esc(v.titulo)}</h3>
        <div class="vlines"><div class="vline" style="animation-delay:.2s">Assistido até o fim. Bom trabalho.</div></div>
      </div>`
    :`<div class="vinner" key="${VP.cena}">
        <div class="vvis">${visSVG(c.vis)}</div>
        <div class="vkick">${esc(c.k)}</div>
        <h3 class="vtitle">${esc(c.t)}</h3>
        <div class="vlines">${c.pts.map((p,i)=>`<div class="vline" style="animation-delay:${.5+i*.9}s">${esc(p)}</div>`).join("")}</div>
      </div>`;
  document.getElementById("vplayer").innerHTML=`
    <div class="vtop"><span class="vt">${esc(v.titulo)}</span><button class="vclose" onclick="closeVideo()">Fechar ✕</button></div>
    <div class="vprog" id="vprog">${prog}</div>
    <div class="vstage" onclick="vPause()">${stage}</div>
    <div class="vfoot">
      <button class="vbtn" onclick="vPrev()">⟨</button>
      ${VP.fim?`<button class="vbtn gold" onclick="vGoto(0)">Rever</button><button class="vbtn" onclick="closeVideo()">Fechar</button>`
             :`<button class="vbtn gold" id="vpausebtn" onclick="vPause()">${VP.pausado?"▶":"⏸"}</button><button class="vbtn" onclick="vNext()">⟩</button>`}
    </div>`;
}

/* ============ MODAL ============ */
function openModal(title,text,bodyHTML,onConfirm){
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalText").textContent=text;
  document.getElementById("modalBody").innerHTML=bodyHTML;
  document.getElementById("modalConfirm").onclick=onConfirm;
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open")}

/* ============ PÓS-RENDER ============ */
function afterRender(){
  const busca=document.getElementById("busca");
  if(busca){
    busca.addEventListener("input",()=>{
      buscaQuery=busca.value;
      const pos=busca.selectionStart;
      render();
      const b2=document.getElementById("busca");
      if(b2){b2.focus();b2.setSelectionRange(pos,pos)}
    });
  }
}
render();
</script>
